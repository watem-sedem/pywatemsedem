name: pywatemsedem-dev
channels:
  - conda-forge
  - defaults
dependencies:
  # Core
  - python>=3.11
  - pip

  # Geospatial (conda handles GDAL/PROJ binaries)
  - geopandas=1.1.4
  - rasterio=1.4.3
  - pyogrio=0.11.0
  - pyproj=3.7.2
  - shapely=2.1.2

  # Data & computation
  - numpy=2.3.5
  - pandas=3.0.0
  - scipy=1.18.0
  - scikit-learn=1.7.2
  - matplotlib=3.11.0

  # Utilities
  - python-dotenv=1.2.1

  # Development tools
  - pip:
      - build
      - pip-tools
      - wheel
